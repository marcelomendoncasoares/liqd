services:
  # Development services
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "8090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: liqd
      POSTGRES_PASSWORD: "TTcgCAbOMM8aFGWZ5_EjOJT8J70WmPWL"
    volumes:
      - liqd_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.6
    ports:
      - "8091:6379"
    command: redis-server --requirepass "HXPXLaFw2FSVQ_UdhjaEzorTQcijCk5D"
    environment:
      - REDIS_REPLICATION_MODE=master

  # Test services
  postgres_test:
    image: pgvector/pgvector:pg16
    ports:
      - "9090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: liqd_test
      POSTGRES_PASSWORD: "GEhzJb0Q-IRsrA8M6yuJdM8rZacxaPNP"
    volumes:
      - liqd_test_data:/var/lib/postgresql/data

  redis_test:
    image: redis:6.2.6
    ports:
      - "9091:6379"
    command: redis-server --requirepass "lonxHfYrgx18jKb3BDkc82SgJC3qRqYn"
    environment:
      - REDIS_REPLICATION_MODE=master

volumes:
  liqd_data:
  liqd_test_data:
